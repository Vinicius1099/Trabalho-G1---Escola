<svg width="680" height="620" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- API Dart -->
  <rect x="240" y="30" width="200" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="340" y="57" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">API Dart / Shelf</text>

  <!-- seta API -> Lista -->
  <line x1="340" y1="74" x2="340" y2="118" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="355" y="100" font-size="12" fill="#666">JSON</text>

  <!-- ListaPage -->
  <rect x="190" y="118" width="300" height="68" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="340" y="143" text-anchor="middle" font-size="14" font-weight="600" fill="#0C447C">ListaPage</text>
  <text x="340" y="163" text-anchor="middle" font-size="12" fill="#185FA5">Lista de alunos</text>

  <!-- ListaPage -> DetalhePage -->
  <path d="M250 186 L250 290" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="178" y="238" text-anchor="middle" font-size="12" fill="#555">toque no item</text>

  <!-- ListaPage -> Formulario criacao -->
  <path d="M430 186 L430 290" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="502" y="238" text-anchor="middle" font-size="12" fill="#555">botão +</text>

  <!-- DetalhePage -->
  <rect x="60" y="290" width="240" height="80" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="180" y="318" text-anchor="middle" font-size="14" font-weight="600" fill="#0C447C">DetalhePage</text>
  <text x="180" y="336" text-anchor="middle" font-size="12" fill="#185FA5">Todos os atributos</text>
  <text x="180" y="354" text-anchor="middle" font-size="12" fill="#185FA5">Editar · Excluir</text>

  <!-- FormularioPage -->
  <rect x="380" y="290" width="240" height="80" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="500" y="318" text-anchor="middle" font-size="14" font-weight="600" fill="#3C3489">FormularioPage</text>
  <text x="500" y="336" text-anchor="middle" font-size="12" fill="#534AB7">Criação / Edição</text>
  <text x="500" y="354" text-anchor="middle" font-size="12" fill="#534AB7">Validação + loading</text>

  <!-- DetalhePage -> FormularioPage -->
  <path d="M300 330 L378 330" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="340" y="322" text-anchor="middle" font-size="12" fill="#555">editar</text>

  <!-- FormularioPage criacao -> ListaPage -->
  <path d="M500 290 Q500 240 430 186" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="545" y="248" text-anchor="middle" font-size="12" fill="#555">salvo ✓</text>

  <!-- Dialog confirmacao -->
  <rect x="60" y="430" width="240" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text x="180" y="453" text-anchor="middle" font-size="14" font-weight="600" fill="#712B13">Dialog confirmação</text>
  <text x="180" y="471" text-anchor="middle" font-size="12" fill="#993C1D">Cancelar · Excluir</text>

  <!-- DetalhePage -> Dialog -->
  <line x1="180" y1="370" x2="180" y2="428" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="198" y="400" font-size="12" fill="#555">excluir</text>

  <!-- Dialog -> ListaPage -->
  <path d="M180 486 Q180 540 340 540 Q440 540 340 186" fill="none" stroke="#555" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text x="220" y="556" font-size="12" fill="#555">confirmado → atualiza lista</text>

  <!-- FormularioPage edicao -> DetalhePage -->
  <path d="M380 350 Q340 400 300 350" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="340" y="412" text-anchor="middle" font-size="12" fill="#555">salvo ✓</text>

  <!-- Cancelar -->
  <text x="500" y="400" text-anchor="middle" font-size="12" fill="#888">cancelar → volta</text>

  <!-- Legenda -->
  <line x1="60" y1="592" x2="100" y2="592" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="108" y="596" font-size="12" fill="#555">navegação</text>
  <line x1="210" y1="592" x2="250" y2="592" stroke="#555" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text x="258" y="596" font-size="12" fill="#555">após ação assíncrona</text>
</svg>
